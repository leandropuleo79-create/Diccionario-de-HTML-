<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Vocall Pro</title>
    <style>
        :root {
            --bg-main: #060913;
            --bg-card: rgba(19, 26, 42, 0.75);
            --border-glow: rgba(234, 88, 12, 0.15);
            --text-title: #ffffff;
            --text-main: #94a3b8;
            --text-bright: #f8fafc;
            
            /* Degradado Aurora Pro */
            --gradient-primary: linear-gradient(135deg, #ff5e3a 0%, #ff2a6d 50%, #9100ff 100%);
            --gradient-btn: linear-gradient(135deg, #ff5e3a 0%, #ff2a6d 100%);
            
            --shadow-glow: 0 8px 32px 0 rgba(255, 42, 109, 0.15);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 94, 58, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(145, 0, 255, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        /* Cabecera con Estilo de Gradiente de Espejo */
        header {
            text-align: center;
            margin: 30px 0 24px 0;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.5px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Panel Superior Glassmorphism */
        .panel-control {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: 24px;
            box-shadow: var(--shadow-glow);
            margin-bottom: 24px;
        }

        .search-container {
            position: relative;
            margin-bottom: 18px;
        }

        .search-box {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            font-size: 1rem;
            box-sizing: border-box;
            background: rgba(10, 15, 26, 0.6);
            color: var(--text-bright);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-box:focus {
            outline: none;
            border-color: #ff2a6d;
            background: rgba(10, 15, 26, 0.9);
            box-shadow: 0 0 15px rgba(255, 42, 109, 0.25);
        }

        /* Controles de Audio Avanzados */
        .audio-settings {
            display: flex;
            flex-direction: column;
            gap: 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .setting-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #cbd5e1;
        }

        select {
            flex-grow: 1;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: #0d1321;
            color: #f1f5f9;
            font-size: 0.85rem;
            outline: none;
            max-width: 65%;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #ff2a6d;
        }

        /* Personalización del Control Deslizante (Range) */
        input[type="range"] {
            -webkit-appearance: none;
            width: 65%;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--gradient-btn);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 42, 109, 0.5);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        /* Lista de Tarjetas Futuristas */
        .listado {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Efecto de iluminación sutil al pasar o tocar */
        .card:hover, .card:active {
            border-color: rgba(255, 42, 109, 0.3);
            transform: translateY(-2px);
            background: rgba(24, 33, 53, 0.85);
            box-shadow: 0 10px 25px -5px rgba(255, 42, 109, 0.08);
        }

        .card-content {
            width: 78%;
        }

        .card-content h3 {
            margin: 0 0 6px 0;
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-bright);
            letter-spacing: -0.3px;
        }

        .card-content p {
            margin: 0;
            color: var(--text-main);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Badge de Idioma Estilo Neon */
        .lang-tag {
            display: inline-flex;
            font-size: 0.65rem;
            background: rgba(255, 42, 109, 0.12);
            color: #ff5e3a;
            padding: 3px 8px;
            border-radius: 8px;
            margin-top: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 42, 109, 0.2);
        }

        /* Botón de Reproducción Rediseñado */
        .btn-play {
            background: var(--gradient-btn);
            color: white;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(255, 42, 109, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-play:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(255, 42, 109, 0.5);
        }
        
        .btn-play:active {
            transform: scale(0.92);
        }
        
        .no-results {
            text-align: center;
            color: #475569;
            margin-top: 40px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HTML Vocall Pro</h1>
        <div class="subtitle">Diccionario de Arquitectura y Etiquetas Web</div>
    </header>

    <div class="panel-control">
        <div class="search-container">
            <input type="text" id="search" class="search-box" placeholder="🔍 Buscar etiqueta o concepto...">
        </div>
        
        <div class="audio-settings">
            <div class="setting-row">
                <label for="voice-select"><span>🗣️</span> Voz del sistema:</label>
                <select id="voice-select"><option>Cargando voces...</option></select>
            </div>
            <div class="setting-row">
                <label for="rate-range"><span>⚡</span> Velocidad (<span id="rate-val">0.9</span>x):</label>
                <input type="range" id="rate-range" min="0.5" max="1.5" step="0.1" value="0.9">
            </div>
        </div>
    </div>

    <div id="listado" class="listado"></div>
</div>

<script>
    const baseDatos = [
        { term: "html", def: "Etiqueta raíz que envuelve absolutamente todo el contenido de un documento HTML.", lang: "en-US" },
        { term: "head", def: "Contenedor que alberga la información técnica de la página (metadatos, enlaces a estilos, scripts) no visible para el usuario.", lang: "en-US" },
        { term: "body", def: "Contenedor principal que encierra todo el contenido visible de la página web (textos, imágenes, videos).", lang: "en-US" },
        { term: "title", def: "Define el título de la página web que se muestra en la pestaña del navegador.", lang: "en-US" },
        { term: "meta", def: "Define metadatos sobre el documento HTML, como la codificación de caracteres (UTF-8), autor o descripción.", lang: "en-US" },
        { term: "link", def: "Establece la relación entre el documento actual y un recurso externo, comúnmente usado para enlazar hojas de estilo CSS.", lang: "en-US" },
        { term: "script", def: "Se utiliza para incrustar o enlazar código de programación ejecutable, generalmente JavaScript.", lang: "en-US" },
        { term: "style", def: "Permite introducir declaraciones de estilo CSS directamente dentro del documento HTML.", lang: "en-US" },
        { term: "header", def: "Representa la cabecera de una página o de una sección, usualmente contiene logotipos y menús de navegación.", lang: "en-US" },
        { term: "nav", def: "Bloque que contiene enlaces de navegación interna o externa para recorrer el sitio web.", lang: "en-US" },
        { term: "main", def: "Define el contenido central y único del documento. Solo debe haber uno por página.", lang: "en-US" },
        { term: "section", def: "Representa una sección genérica y temática dentro del documento que agrupa contenido relacionado.", lang: "en-US" },
        { term: "article", def: "Contenedor para una composición autónoma y reutilizable que tiene sentido de forma independiente (ej: un post o noticia).", lang: "en-US" },
        { term: "aside", def: "Define contenido de soporte o tangencial al contenido principal, frecuentemente usado para barras laterales.", lang: "en-US" },
        { term: "footer", def: "Representa el pie de página de un documento o sección, donde suelen ir derechos de autor y enlaces legales.", lang: "en-US" },
        { term: "div", def: "Contenedor de bloque genérico sin significado semántico, utilizado exclusivamente para agrupar elementos y aplicar estilos.", lang: "en-US" },
        { term: "p", def: "Etiqueta utilizada para estructurar bloques de texto en forma de párrafos.", lang: "en-US" },
        { term: "span", def: "Contenedor en línea genérico sin significado semántico, ideal para aplicar estilos a fragmentos de texto específicos.", lang: "en-US" },
        { term: "strong", def: "Indica que el texto tiene una importancia mayor y, por defecto, el navegador lo renderiza en negrita.", lang: "en-US" },
        { term: "em", def: "Aplica énfasis a un fragmento de texto, renderizándolo habitualmente en cursiva.", lang: "en-US" },
        { term: "br", def: "Produce un salto de línea simple dentro del texto sin crear un nuevo párrafo.", lang: "en-US" },
        { term: "hr", def: "Crea una línea horizontal que representa una ruptura temática o separación visual entre contenidos.", lang: "en-US" },
        { term: "blockquote", def: "Representa una sección de texto que ha sido citada directamente de otra fuente o autor.", lang: "en-US" },
        { term: "ul", def: "Define una lista desordenada cuyos elementos se muestran habitualmente con viñetas o puntos.", lang: "en-US" },
        { term: "ol", def: "Define una lista ordenada cuyos elementos siguen una secuencia numérica o alfabética.", lang: "en-US" },
        { term: "li", def: "Representa un elemento o ítem específico dentro de cualquier tipo de lista (ul u ol).", lang: "en-US" },
        { term: "a", def: "Etiqueta de anclaje utilizada para crear hipervínculos hacia otras páginas, archivos o secciones externas.", lang: "en-US" },
        { term: "img", def: "Permite incrustar y desplegar imágenes en el documento mediante el atributo obligatorio 'src'.", lang: "en-US" },
        { term: "video", def: "Contenedor multimedia para reproducir archivos de video de forma nativa en el navegador.", lang: "en-US" },
        { term: "audio", def: "Contenedor multimedia diseñado para reproducir pistas de sonido o música sin plugins externos.", lang: "en-US" },
        { term: "form", def: "Define una sección interactiva con campos que permiten recolectar información del usuario.", lang: "en-US" },
        { term: "input", def: "Campo de entrada de datos altamente versátil cuyo comportamiento cambia según su atributo 'type'.", lang: "en-US" },
        { term: "button", def: "Representa un botón interactivo para enviar formularios o ejecutar acciones programadas.", lang: "en-US" },
        { term: "table", def: "Contenedor principal para estructurar y presentar datos complejos en filas y columnas.", lang: "en-US" }
    ];

    const listadoEl = document.getElementById('listado');
    const searchEl = document.getElementById('search');
    const voiceSelect = document.getElementById('voice-select');
    const rateRange = document.getElementById('rate-range');
    const rateVal = document.getElementById('rate-val');

    let vocesDisponibles = [];

    function cargarVoces() {
        if (!('speechSynthesis' in window) || !window.speechSynthesis) {
            voiceSelect.innerHTML = '<option value="fallback">🌐 Modo Online (Audio Remoto)</option>';
            return;
        }

        try {
            vocesDisponibles = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            
            if (vocesDisponibles.length === 0) {
                voiceSelect.innerHTML = '<option value="fallback">🌐 Modo Online (Audio Remoto)</option>';
                return;
            }

            vocesDisponibles.forEach((voz, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${voz.name} (${voz.lang})`;
                if(voz.default) option.selected = true;
                voiceSelect.appendChild(option);
            });
        } catch (err) {
            voiceSelect.innerHTML = '<option value="fallback">🌐 Modo Online (Audio Remoto)</option>';
        }
    }

    if ('speechSynthesis' in window && window.speechSynthesis) {
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = cargarVoces;
        }
    }

    function hablar(texto, idiomaOriginal) {
        const usarFallback = (voiceSelect.value === "fallback" || !('speechSynthesis' in window) || !window.speechSynthesis);

        if (!usarFallback) {
            try {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.rate = parseFloat(rateRange.value);
                
                const vozSeleccionada = vocesDisponibles[voiceSelect.value];
                if (vozSeleccionada) {
                    utterance.voice = vozSeleccionada;
                    utterance.lang = vozSeleccionada.lang;
                } else {
                    utterance.lang = idiomaOriginal;
                }
                window.speechSynthesis.speak(utterance);
                return;
            } catch (e) {
                console.warn("Error en SpeechSynthesis nativo. Pasando a canal online...", e);
            }
        }

        // --- SISTEMA ONLINE FALLBACK ---
        const tagIdioma = idiomaOriginal || 'en-US';
        const endpointTTS = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${tagIdioma}&client=tw-ob&q=${encodeURIComponent(texto)}`;
        
        let reproductorAudio = document.getElementById('audio-fallback-element');
        if (!reproductorAudio) {
            reproductorAudio = document.createElement('audio');
            reproductorAudio.id = 'audio-fallback-element';
            document.body.appendChild(reproductorAudio);
        }
        
        reproductorAudio.src = endpointTTS;
        reproductorAudio.playbackRate = parseFloat(rateRange.value);
        reproductorAudio.play().catch(error => {
            console.error("Interacción requerida:", error);
        });
    }

    function renderizarDiccionario(terminos) {
        listadoEl.innerHTML = '';
        if(terminos.length === 0) {
            listadoEl.innerHTML = `<div class="no-results">No se encontraron etiquetas que coincidan.</div>`;
            return;
        }

        terminos.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-content">
                    <h3>${item.term}</h3>
                    <p>${item.def}</p>
                    <span class="lang-tag">${item.lang}</span>
                </div>
                <button class="btn-play" title="Escuchar">🔊</button>
            `;
            
            card.querySelector('.btn-play').addEventListener('click', () => {
                hablar(item.term, item.lang);
            });

            listadoEl.appendChild(card);
        });
    }

    searchEl.addEventListener('input', (e) => {
        const busqueda = e.target.value.toLowerCase();
        const filtrados = baseDatos.filter(item => 
            item.term.toLowerCase().includes(busqueda) || 
            item.def.toLowerCase().includes(busqueda)
        );
        renderizarDiccionario(filtrados);
    });

    rateRange.addEventListener('input', (e) => {
        rateVal.textContent = e.target.value;
    });

    cargarVoces();
    renderizarDiccionario(baseDatos);
</script>

</body>
</html>
